<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardRail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Plus+Jakarta+Sans:wght@400..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="popup">
        <header class="popup__header">
            <img src="assets/guardrail-mark.svg" alt="GuardRail" class="popup__logo">
            <div class="popup__header-text">
                <h1>GuardRail</h1>
                <p>Alertas visuais para ambientes sensíveis</p>
            </div>
            <button type="button" id="theme-toggle" class="theme-toggle" title="Alternar tema" aria-label="Alternar tema claro/escuro">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
        </header>

        <p id="feedback" class="feedback" aria-live="polite" hidden></p>

        <div class="tabs" role="tablist" aria-label="Navegação do popup">
            <button type="button" id="tab-rules" class="tab tab--active" data-tab="rules" role="tab"
                aria-selected="true">Regras</button>
            <button type="button" id="tab-settings" class="tab" data-tab="settings" role="tab"
                aria-selected="false">Configurações</button>
        </div>

        <section id="panel-rules" class="tab-panel tab-panel--active" data-panel="rules" role="tabpanel">
            <section class="card card--rule-form">
                <h2>Adicionar regra</h2>
                <p class="helper-text">Precedência automática: regra mais específica vence (com desempate pela ordem da
                    lista).</p>
                <form id="rule-form" class="rule-form">
                    <div class="field-group">
                        <label for="rule-value">Valor da regra</label>
                        <input id="rule-value" type="text" placeholder="Ex: https://app.exemplo.com/" autocomplete="off"
                            required>
                    </div>

                    <div class="field-group">
                        <button type="button" id="add-current-url" class="btn">Usar URL atual</button>
                    </div>

                    <div class="row two-columns">
                        <div class="field-group">
                            <label for="rule-type">Tipo de comparação</label>
                            <select id="rule-type">
                                <option value="startsWith">Começa com</option>
                                <option value="contains">Contém</option>
                                <option value="regex">Regex</option>
                                <option value="domain">Domínio exato</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label for="rule-profile">Perfil</label>
                            <select id="rule-profile"></select>
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="rule-tag">Tag (opcional)</label>
                        <input id="rule-tag" type="text" placeholder="Ex: admin" maxlength="24">
                    </div>

                    <div class="row actions">
                        <button type="submit" class="btn btn--primary">Adicionar regra</button>
                    </div>
                </form>
            </section>

            <section class="card">
                <div class="section-header">
                    <h2>Regras ativas</h2>
                    <button type="button" id="clear-rules" class="btn btn--danger">Limpar tudo</button>
                </div>
                <div class="field-group">
                    <label for="rules-group-by">Agrupar por</label>
                    <select id="rules-group-by">
                        <option value="none">Sem agrupamento</option>
                        <option value="profile">Perfil</option>
                        <option value="domain">Domínio-base</option>
                        <option value="tag">Tag</option>
                    </select>
                </div>
                <ul id="rule-list" class="rule-list"></ul>
                <p id="empty-state" class="empty-state">Nenhuma regra cadastrada.</p>
                <button type="button" id="undo-remove" class="btn" hidden>Desfazer última remoção</button>
            </section>
        </section>

        <section id="panel-settings" class="tab-panel" data-panel="settings" role="tabpanel" hidden>
            <section class="card">
                <div class="section-header">
                    <h2>Perfis</h2>
                </div>
                <p class="helper-text">Cada ambiente possui cor e texto próprios para o banner.</p>

                <div class="profile-create-row">
                    <div class="field-group profile-create-row__input">
                        <label for="custom-profile-name">Novo contexto</label>
                        <input id="custom-profile-name" type="text" placeholder="Ex: Cliente X" maxlength="40">
                    </div>
                    <button type="button" id="add-profile" class="btn">Criar contexto</button>
                </div>

                <ul id="profile-list" class="profile-list"></ul>
            </section>

            <section class="card">
                <h2>Borda</h2>

                <div class="row two-columns">
                    <div class="field-group">
                        <label for="border-width">Espessura (px)</label>
                        <input id="border-width" type="number" min="1" max="16" value="4">
                    </div>
                    <div class="field-group">
                        <label for="border-style">Estilo</label>
                        <select id="border-style">
                            <option value="solid">Sólido</option>
                            <option value="dashed">Tracejado</option>
                        </select>
                    </div>
                </div>

                <div class="toggle-row">
                    <label for="banner-enabled">Mostrar mensagem fixa no topo</label>
                    <span class="toggle-switch">
                        <input id="banner-enabled" type="checkbox" checked>
                        <span class="toggle-track"></span>
                    </span>
                </div>

                <div class="toggle-row">
                    <label for="banner-always-minimized">Manter banner sempre minimizado</label>
                    <span class="toggle-switch">
                        <input id="banner-always-minimized" type="checkbox">
                        <span class="toggle-track"></span>
                    </span>
                </div>
            </section>

            <section class="card">
                <div class="toggle-row">
                    <label for="confirm-delete">Confirmar antes de remover regra</label>
                    <span class="toggle-switch">
                        <input id="confirm-delete" type="checkbox" checked>
                        <span class="toggle-track"></span>
                    </span>
                </div>

                <hr class="card-separator">

                <div class="row actions">
                    <button type="button" id="export-config" class="btn">Exportar JSON</button>
                    <button type="button" id="import-config" class="btn">Importar JSON</button>
                    <input id="import-file" type="file" accept="application/json" hidden>
                </div>
            </section>
        </section>
    </main>

    <script src="modules/config-schema.js"></script>
    <script src="modules/storage.js"></script>
    <script src="modules/rule-matcher.js"></script>
    <script src="modules/profiles.js"></script>
    <script src="modules/import-export.js"></script>
    <script src="modules/ui-render.js"></script>
    <script src="popup.js"></script>
</body>

</html>
