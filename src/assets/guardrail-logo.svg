<svg width="512" height="160" viewBox="0 0 512 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img"
    aria-labelledby="title desc">
    <title id="title">GuardRail Logo</title>
    <desc id="desc">Escudo com trilhos e palavra GuardRail.</desc>

    <defs>
        <linearGradient id="shieldGrad" x1="16" y1="8" x2="112" y2="136" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#1D4ED8" />
            <stop offset="1" stop-color="#0F172A" />
        </linearGradient>
        <linearGradient id="railGrad" x1="38" y1="32" x2="96" y2="96" gradientUnits="userSpaceOnUse">
